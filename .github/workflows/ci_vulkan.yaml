name: CI / vulkan

on:
  workflow_dispatch:
  pull_request:

jobs:
  shader-compile-vulkan:
    runs-on: ${{ fromJSON(vars.CI_VULKAN_RUNNER_LABELS != '' && vars.CI_VULKAN_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential glslc
      - name: shader-compile-vulkan
        run: cargo test -p candle-vulkan-kernels --lib

  gpu-correctness-vulkan:
    needs: shader-compile-vulkan
    runs-on: ${{ fromJSON(vars.CI_VULKAN_RUNNER_LABELS != '' && vars.CI_VULKAN_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential glslc vulkan-tools mesa-vulkan-drivers
      - name: Vulkan feature smoke
        run: cargo test -p candle-core --features vulkan backend_smoke_vulkan_feature_flag_is_visible -- --exact
      - name: Detect Vulkan runtime
        if: runner.os == 'Linux'
        id: vulkan-runtime
        shell: bash
        run: |
          set -euo pipefail
          if command -v vulkaninfo >/dev/null 2>&1 && timeout 20s vulkaninfo --summary >/tmp/vulkaninfo.txt 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vulkan runtime not available; skipping GPU correctness phase."
            if [ -f /tmp/vulkaninfo.txt ]; then
              tail -n 20 /tmp/vulkaninfo.txt
            fi
          fi
      - name: gpu-correctness-vulkan
        if: runner.os == 'Linux' && steps.vulkan-runtime.outputs.available == 'true'
        run: |
          cargo test -p candle-core --features vulkan --test backend_smoke_tests
          cargo test -p candle-core --features vulkan ggml_fixture_ops_vulkan -- --ignored --exact
          cargo test -p candle-core --lib --features vulkan vulkan_backend::tests:: -- --ignored

  perf-vulkan:
    needs: gpu-correctness-vulkan
    runs-on: ${{ fromJSON(vars.CI_VULKAN_RUNNER_LABELS != '' && vars.CI_VULKAN_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Vulkan runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential glslc vulkan-tools mesa-vulkan-drivers
      - name: Detect Vulkan runtime
        if: runner.os == 'Linux'
        id: vulkan-runtime
        shell: bash
        run: |
          set -euo pipefail
          if command -v vulkaninfo >/dev/null 2>&1 && timeout 20s vulkaninfo --summary >/tmp/vulkaninfo.txt 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vulkan runtime not available; skipping Vulkan perf stage."
          fi
      - name: perf-vulkan
        if: runner.os == 'Linux' && steps.vulkan-runtime.outputs.available == 'true'
        run: cargo bench -p candle-core --bench bench_main --features vulkan
